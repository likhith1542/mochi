name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build and attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mochi ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseBody: |
            A desktop pet that lives on top of your screen — with physics and gentle reminders. 🐾

            ## Install

            **macOS** — download the `.dmg` (universal: Apple Silicon + Intel), drag Mochi to Applications.
            Unsigned build: right-click `Mochi.app` → **Open** → **Open**, or run `xattr -cr /Applications/Mochi.app`.

            **Windows** — download the `.msi` (or `-setup.exe`). SmartScreen may warn on unsigned apps: click **More info** → **Run anyway**.

            **Linux** — download the `.AppImage` (`chmod +x`, then run), `.deb`, or `.rpm`. Window transparency requires a compositor.

            Right-click the pet for reminders, names, skins, and settings.
